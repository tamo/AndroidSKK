# フリック設定

# [Main] [ASCII] [Number] [Voice] のセクション別に指定
# ASCII セクションが存在しなければ英数モードでも Main を使用

# 各行の書式は キー番号,キーラベル,[[(K)]ポップアップラベル,[(N)]アクション],...

# キー番号は左上から 01234,56789,... で 19 までが標準
# 20 以上の数字がある場合は 23 まである Godan のレイアウト (19 が縦長)
# キー番号のうしろに S を付けるとシフト時の設定

# キーラベルは、設定されていない場合は最初の 5 ラベルから合成

# ポップアップラベルとアクションのペアは「あいうえお」段 5 つに加え、
#「あ」左カーブ、「あ」右カーブ、「い」左カーブ、「い」右カーブ…… で合計 15 ペア (30 項目)

# (K): カタカナのときだけ有効なポップアップラベルを指定 (「う」に濁点を付けず「ウ」には付けたいので)
# (N): 候補のあるモードでは一旦エンターを発行して確定してから続行 (特に x は操作キーと解釈されるので)
# (n): 事前に n が残っている場合は何もせず、なければ n を発行してから続行 (nnn を回避)
# (Commit): このあとの文字列をローマ字として解釈せず直接出力
# (Z): このあとの文字列を全角英数モードで出力 (整合性を保つわけでもないので Commit で代用できる)

# (C), (A), (M): Ctrl, Alt, Meta のモディファイア
# (): 何もしない (「(C)」と入力したいとき「(()C)」とするための記法)
# (Comma): \, のようなエスケープは存在しないのでコンマはこれ

